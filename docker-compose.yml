services:
  backend:
    build: ./agent-server
    ports:
      - "3001:3001"
    env_file: ./agent-server/.env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - TZ=America/Mexico_City
    volumes:
      - backend-data:/app/data
      - backend-media:/app/media
    restart: unless-stopped

  frontend:
    build: ./web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${PUBLIC_BACKEND_URL:-http://localhost:3001}
      - HOSTNAME=0.0.0.0
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
  backend-media:
